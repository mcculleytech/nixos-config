name: "nix flake update"
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */3 * *'
jobs:
  lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout Repo
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
    - name: Install Nix
      # Determinate Nix (3.x) — the older cachix/install-nix-action@v27 nix did
      # not reliably attach the access-token to the GitHub HEAD-resolution call,
      # so `nix flake update` re-resolved every github: input (80+ transitively)
      # UNAUTHENTICATED — 60 req/hr per IP — and shared runners hit HTTP 429
      # (gzipped body that nix chokes on: "parse error ... '<U+001F>'").
      uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      with:
        # access-tokens raises the GitHub API limit to 5000 req/hr.
        extra-conf: |
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
    - name: Update flake.lock
      id: update
      uses: DeterminateSystems/update-flake-lock@3c4f567004c3b0f7bb85177df020f3825028d2b1 # main
      with:
        token: ${{ secrets.PAT_TOKEN }}
    - name: Enable auto-merge
      if: steps.update.outputs.pull-request-number != ''
      env:
        GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: gh pr merge ${{ steps.update.outputs.pull-request-number }} --auto --merge
