name: "nix flake check"
on:
  pull_request:
    branches: [ master ]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
    - name: Install Nix
      uses: cachix/install-nix-action@v27
    - name: Evaluate server configs and devShells
      run: |
        # Evaluate configs that don't require git-crypt secrets
        # Workstation configs (aeneas) reference git-crypt encrypted files
        # and cannot be evaluated without decryption
        nix eval .#nixosConfigurations.vader.config.system.build.toplevel 2>&1
        nix eval .#nixosConfigurations.phantom.config.system.build.toplevel 2>&1
        nix eval .#nixosConfigurations.atreides.config.system.build.toplevel 2>&1
        nix eval .#nixosConfigurations.saruman.config.system.build.toplevel 2>&1
        nix eval .#devShells.x86_64-linux 2>&1
