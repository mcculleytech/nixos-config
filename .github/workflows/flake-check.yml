name: "nix flake check"
on:
  pull_request:
    branches: [ master ]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
    - name: Install Nix
      uses: cachix/install-nix-action@v27
    - name: Run flake check
      run: nix flake check --no-build
