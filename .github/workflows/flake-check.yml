name: "nix flake check"
on:
  pull_request:
    branches: [ master ]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Install Nix
      # Determinate Nix (3.x) reliably attaches the access-token to GitHub API
      # calls, so flake-input resolution isn't subject to the 60 req/hr
      # unauthenticated rate limit (HTTP 429). See update-flake.yml for detail.
      uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      with:
        extra-conf: |
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
    - name: Decrypt git-crypt secrets
      run: |
        nix profile install nixpkgs#git-crypt
        echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/git-crypt-key
        git-crypt unlock /tmp/git-crypt-key
        rm /tmp/git-crypt-key
    - name: Run flake check
      run: nix flake check --no-build
