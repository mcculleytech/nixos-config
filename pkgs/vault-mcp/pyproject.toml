[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "vault-mcp"
version = "0.1.0"
description = "MCP server fronting an Obsidian vault on disk"
requires-python = ">=3.11"
dependencies = [
  "mcp>=1.15",
  "starlette>=0.47",
  "uvicorn>=0.35",
]

[project.scripts]
vault-mcp = "vault_mcp.server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["vault_mcp*"]
