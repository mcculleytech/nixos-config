[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "radicale-mcp"
version = "0.1.0"
description = "MCP server fronting a Radicale CalDAV/CardDAV instance"
requires-python = ">=3.11"
dependencies = [
  "mcp>=1.15",
  "starlette>=0.47",
  "uvicorn>=0.35",
  "caldav>=2.0",
  "vobject>=0.9",
]

[project.scripts]
radicale-mcp = "radicale_mcp.server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["radicale_mcp*"]
