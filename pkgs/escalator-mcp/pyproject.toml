[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "escalator-mcp"
version = "0.1.0"
description = "MCP exposing a single consult_expert tool that one-shots a question against a frontier model via OpenRouter"
requires-python = ">=3.11"
dependencies = [
  "mcp>=1.15",
  "starlette>=0.47",
  "uvicorn>=0.35",
  "httpx>=0.27",
]

[project.scripts]
escalator-mcp = "escalator_mcp.server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["escalator_mcp*"]
