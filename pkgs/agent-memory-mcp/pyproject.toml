[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-memory-mcp"
version = "0.1.0"
description = "MCP server fronting a pgvector-backed shared agent memory store"
requires-python = ">=3.11"
dependencies = [
  "mcp>=1.15",
  "psycopg[binary]>=3.2",
  "pgvector>=0.4",
  "starlette>=0.47",
  "uvicorn>=0.35",
  "httpx>=0.28",
]

[project.scripts]
agent-memory-mcp = "agent_memory_mcp.server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["agent_memory_mcp*"]
