[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "prometheus-mcp"
version = "0.1.0"
description = "MCP server fronting a Prometheus + Alertmanager instance"
requires-python = ">=3.11"
dependencies = [
  "mcp>=1.15",
  "starlette>=0.47",
  "uvicorn>=0.35",
  "httpx>=0.28",
]

[project.scripts]
prometheus-mcp = "prometheus_mcp.server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["prometheus_mcp*"]
